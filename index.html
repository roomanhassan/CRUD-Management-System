<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CRUD Management System</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- Dark Mode Toggle (fixed position) -->
  <button id="theme-toggle" class="theme-toggle" aria-label="Toggle dark mode" title="Toggle dark mode">
    <span class="theme-icon">🌙</span>
  </button>

  <div class="container">
    <header>
      <h1>Management System</h1>
      <p class="subtitle">Manage your records with ease</p>
    </header>

    <!-- Form Section -->
    <section class="form-section">
      <h2 id="form-title">Add New Employee</h2>
      <form id="crud-form">
        <input type="hidden" id="record-id" />

        <div class="form-grid">
          <div class="form-group">
            <label for="name">Full Name</label>
            <input type="text" id="name" placeholder="e.g. John Doe" required />
          </div>

          <div class="form-group">
            <label for="email">Email Address</label>
            <input type="email" id="email" placeholder="e.g. john@example.com" required />
          </div>

          <div class="form-group">
            <label for="role">Role</label>
            <input type="text" id="role" placeholder="e.g. Developer" required />
          </div>

          <div class="form-group">
            <label for="department">Department</label>
            <select id="department" required>
              <option value="" disabled selected>Select department</option>
              <option value="Engineering">Engineering</option>
              <option value="Design">Design</option>
              <option value="Marketing">Marketing</option>
              <option value="Sales">Sales</option>
              <option value="HR">HR</option>
              <option value="Finance">Finance</option>
              <option value="Operations">Operations</option>
            </select>
          </div>
        </div>

        <div class="form-actions">
          <button type="submit" class="btn btn-primary" id="submit-btn">Add Employee</button>
          <button type="button" class="btn btn-secondary" id="cancel-btn" style="display:none;">Cancel</button>
        </div>
      </form>
    </section>

    <!-- Search & Stats -->
    <section class="toolbar">
      <div class="stats">
        <span>Total Records: <strong id="total-count">0</strong></span>
      </div>
      <div class="search-box">
        <input type="text" id="search-input" placeholder="Search by name, email, or role..." />
        <button class="btn btn-clear" id="clear-search" title="Clear search">✕</button>
      </div>
    </section>

    <!-- Table Section -->
    <section class="table-section">
      <div class="table-wrapper">
        <table id="records-table">
          <thead>
            <tr>
              <th>#</th>
              <th>Name</th>
              <th>Email</th>
              <th>Role</th>
              <th>Department</th>
              <th>Created</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody id="table-body">
            <!-- Rows injected by JS -->
          </tbody>
        </table>
        <div id="empty-state" class="empty-state">
          <div class="empty-icon">📋</div>
          <p>No records found. Add one above to get started.</p>
        </div>
      </div>
    </section>
  </div>

  <!-- Delete Confirmation Modal -->
  <div id="modal-overlay" class="modal-overlay" style="display:none;">
    <div class="modal">
      <div class="modal-icon">🗑️</div>
      <h3>Delete Record</h3>
      <p>Are you sure you want to delete <strong id="modal-name"></strong>? This action cannot be undone.</p>
      <div class="modal-actions">
        <button class="btn btn-danger" id="confirm-delete">Delete</button>
        <button class="btn btn-secondary" id="cancel-delete">Cancel</button>
      </div>
    </div>
  </div>

  <!-- Toast Notification -->
  <div id="toast" class="toast" aria-live="polite"></div>

  <!-- Footer -->
  <footer class="footer">
    <p>Developer: <strong>Rooman Hassan</strong></p>
  </footer>

  <script src="script.js"></script>
</body>
</html>
